<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Portal - Volunteer Connect</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVIGATION BAR (Identical structure for fluid mapping context) -->
  <header>
    <nav class="navbar container">
      <div class="logo">
        <a href="#" class="logo-txt"><span>Volunteer</span>Connect.</a>
      </div>
      <ul class="navlist" id="navlist">
        <li><a href="index.html" class="navlinks">Home</a></li>
        <li><a href="index.html#steps-section" class="navlinks">How it Works</a></li>
        <li><a href="portal.html" class="navlinks active">Opportunities</a></li>
        <li><a href="#" class="navlinks">Contact</a></li>
      </ul>
      <div class="nav-auth-container" id="navAuthContainer">
        <a href="portal.html" class="nav-signin-btn">Sign In</a>
      </div>
      <div class="hamburger" id="hamburger">
        <div class="burger"></div>
        <div class="burger"></div>
        <div class="burger"></div>
      </div>
    </nav>
  </header>

  <main>
    <!-- DUAL TABBED LOGIN FORM COMPONENT SECTION -->
    <section class="portal-section">
      <div class="portal-container">
        <h2>Access Portal</h2>
        <p class="portal-subtitle">Welcome back! Choose your interface profile window.</p>
        
        <!-- Interactive Form Switches -->
        <div class="tab-header">
          <button class="tab-btn active-tab" data-target="volunteer-form">
            <i class="fa-solid fa-hand-holding-heart"></i> Volunteer
          </button>
          <button class="tab-btn" data-target="ngo-form">
            <i class="fa-solid fa-building-ngo"></i> NGO Partner
          </button>
        </div>

        <!-- Layout Forms Wrapper Elements -->
        <div class="tab-content">
          
          <!-- Form Segment A: Individual Volunteer Sign-In -->
          <form id="volunteer-form" class="auth-form active-form" onsubmit="mockSignIn(event, 'volunteer')">
            <h3>Volunteer Sign-In</h3>
            <div class="input-group">
              <label for="v-email">Email Address</label>
              <input type="email" id="v-email" placeholder="sujan123@gmail.com" required>
            </div>
            <div class="input-group">
              <label for="v-password">Password</label>
              <input type="password" id="v-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary w-100">Sign In as Volunteer</button>
            <p class="form-footer">New here? <a href="#">Create volunteer account</a></p>
          </form>

          <!-- Form Segment B: Verified Organization Sign-In -->
          <form id="ngo-form" class="auth-form" onsubmit="mockSignIn(event, 'ngo')">
            <h3>NGO & Partner Sign-In</h3>
            <div class="input-group">
              <label for="ngo-email">Organization Email</label>
              <input type="email" id="ngo-email" placeholder="contact@redcross.org" required>
            </div>
            <div class="input-group">
              <label for="ngo-password">Password</label>
              <input type="password" id="ngo-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary w-100">Sign In as NGO Partner</button>
            <p class="form-footer">Want to recruit helpers? <a href="#">Apply for Organization Access</a></p>
          </form>
          
        </div>
      </div>
    </section>
  </main>



  <script>
    // Tab switching engine
    const tabButtons = document.querySelectorAll('.tab-btn');
    const authForms = document.querySelectorAll('.auth-form');

    tabButtons.forEach(button => {
      button.addEventListener('click', () => {
        const targetId = button.getAttribute('data-target');
        
        tabButtons.forEach(btn => btn.classList.remove('active-tab'));
        authForms.forEach(form => form.classList.remove('active-form'));

        button.classList.add('active-tab');
        document.getElementById(targetId).classList.add('active-form');
      });
    });

    // Mock Login Process: Set localized storage data flag, redirect to dashboard/home page
    function mockSignIn(event, type) {
      event.preventDefault(); // Stop page from submitting normally
      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('userType', type);
      window.location.href = 'index.html'; // Redirect to home showing logged-in profile interface layout
    }

    // Keep mobile nav menu operational
    const hamburger = document.getElementById('hamburger');
    const navlist = document.getElementById('navlist');
    hamburger.addEventListener('click', () => {
      navlist.classList.toggle('open');
      hamburger.classList.toggle('toggle');
    });
  </script>
</body>
</html>
